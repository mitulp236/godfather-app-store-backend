<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070406" />
    <title>Admin · Godfather App Store</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  </head>

  <body class="min-h-screen">
    <!-- Hidden until /auth/me confirms a session, so the dashboard never flashes
         before a redirect to the login page. -->
    <div id="shell" class="hidden">
      <header class="sticky top-0 z-30 border-b border-white/[0.07] bg-ink-950/85 backdrop-blur-lg">
        <div class="mx-auto flex max-w-[86rem] items-center justify-between gap-4 px-5 py-4 sm:px-8">
          <div class="flex items-baseline gap-3">
            <span
              class="bg-gradient-to-b from-white to-blood-300 bg-clip-text font-display text-[1.7rem] font-black leading-none text-transparent"
              >Godfather</span
            >
            <span class="hidden text-[0.62rem] font-bold uppercase tracking-[0.35em] text-gold-400/70 sm:inline"
              >App Store</span
            >
          </div>

          <div class="flex items-center gap-3">
            <span id="user-email" class="hidden text-[0.85rem] font-semibold text-white/40 sm:inline"></span>
            <button id="logout" class="btn-ghost !px-4 !py-2 !text-[0.82rem]">Sign out</button>
          </div>
        </div>

        <nav class="mx-auto flex max-w-[86rem] gap-1 px-5 sm:px-8">
          <button data-tab="apps" class="tab-btn">Apps <span id="count-apps" class="tab-count">0</span></button>
          <button data-tab="categories" class="tab-btn">
            Categories <span id="count-categories" class="tab-count">0</span>
          </button>
        </nav>
      </header>

      <main class="mx-auto max-w-[86rem] px-5 py-8 sm:px-8">
        <!-- ------------------------------- APPS ------------------------------ -->
        <section id="panel-apps">
          <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div class="flex flex-1 flex-col gap-3 sm:flex-row sm:items-center">
              <input
                id="app-search"
                type="search"
                placeholder="Search title, description or package…"
                class="field sm:max-w-[24rem]"
              />
              <select id="app-filter" class="field sm:max-w-[13rem]">
                <option value="">All categories</option>
              </select>
            </div>
            <button id="add-app" class="btn-primary shrink-0">
              <span class="text-[1.1rem] leading-none">+</span> Add app
            </button>
          </div>

          <div id="apps-grid" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
          <p id="apps-empty" class="hidden py-16 text-center text-[1rem] text-white/30"></p>
        </section>

        <!-- ---------------------------- CATEGORIES --------------------------- -->
        <section id="panel-categories" class="hidden">
          <div class="mb-6 flex items-center justify-between gap-3">
            <p class="text-[0.9rem] text-white/40">
              Categories drive the TV app's sidebar. Deleting one requires it to be empty.
            </p>
            <button id="add-category" class="btn-primary shrink-0">
              <span class="text-[1.1rem] leading-none">+</span> Add category
            </button>
          </div>

          <div id="categories-list" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
          <p id="categories-empty" class="hidden py-16 text-center text-[1rem] text-white/30"></p>
        </section>
      </main>
    </div>

    <!-- --------------------------------- MODAL -------------------------------- -->
    <div id="modal" class="fixed inset-0 z-50 hidden">
      <div id="modal-backdrop" class="absolute inset-0 bg-black/75 backdrop-blur-sm"></div>
      <div class="relative flex min-h-full items-start justify-center p-4 sm:p-8">
        <div
          class="card w-full max-w-[46rem] animate-fade-up overflow-hidden shadow-2xl shadow-black/60"
        >
          <div
            class="flex items-center justify-between gap-4 border-b border-white/[0.07] px-6 py-5 sm:px-8"
          >
            <h2 id="modal-title" class="font-display text-[1.6rem] font-black tracking-tight"></h2>
            <button id="modal-close" class="btn-ghost !px-3 !py-1.5 !text-[1.1rem] leading-none">
              ✕
            </button>
          </div>

          <form id="modal-form" class="max-h-[70vh] overflow-y-auto px-6 py-6 sm:px-8" novalidate></form>

          <div
            class="flex items-center justify-end gap-3 border-t border-white/[0.07] bg-ink-950/40 px-6 py-4 sm:px-8"
          >
            <p id="modal-error" class="mr-auto hidden text-[0.85rem] font-semibold text-blood-300"></p>
            <button id="modal-cancel" class="btn-ghost">Cancel</button>
            <button id="modal-save" class="btn-primary">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ------------------------------- CONFIRM -------------------------------- -->
    <div id="confirm" class="fixed inset-0 z-[60] hidden">
      <div class="absolute inset-0 bg-black/75 backdrop-blur-sm"></div>
      <div class="relative flex min-h-full items-center justify-center p-5">
        <div class="card w-full max-w-[26rem] animate-fade-up p-7">
          <h3 id="confirm-title" class="text-[1.25rem] font-extrabold"></h3>
          <p id="confirm-body" class="mt-3 text-[0.92rem] leading-relaxed text-white/55"></p>
          <div class="mt-7 flex justify-end gap-3">
            <button id="confirm-cancel" class="btn-ghost">Cancel</button>
            <button id="confirm-ok" class="btn-danger">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- -------------------------------- TOASTS -------------------------------- -->
    <div id="toasts" class="pointer-events-none fixed bottom-5 right-5 z-[70] flex flex-col gap-2"></div>

    <script src="app.js"></script>
  </body>
</html>
